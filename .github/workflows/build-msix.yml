name: Build MSIX Package

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    env:
      Solution_Name: Bookmarkly.slnx
      App_Project_Path: Bookmarkly.App\Bookmarkly.App.csproj
      Configuration: Release
      Platform: x64
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Restore NuGet packages
      run: dotnet restore ${{ env.Solution_Name }}
      
    - name: Create and install certificate
      run: |
        $pfxCertFilePath = Join-Path -Path $env:RUNNER_TEMP -ChildPath "cert.pfx"
        $cerCertFilePath = Join-Path -Path $env:RUNNER_TEMP -ChildPath "cert.cer"
        
        # Generate a random password for certificate (alphanumeric + special chars)
        $certPassword = -join ((33..126) | Get-Random -Count 32 | ForEach-Object {[char]$_})
        
        # Create a self-signed certificate for package signing
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Bookmarkly-Temp-Cert" -KeyUsage DigitalSignature -FriendlyName "Bookmarkly Temp Signing Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        
        # Export certificate
        $password = ConvertTo-SecureString -String $certPassword -Force -AsPlainText
        Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath $pfxCertFilePath -Password $password
        Export-Certificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath $cerCertFilePath
        
        # Import to trusted root
        Import-Certificate -FilePath $cerCertFilePath -CertStoreLocation Cert:\LocalMachine\Root
        
        # Store paths and password for later steps
        # Mask the password to prevent it from appearing in logs
        echo "PFX_CERT_PATH=$pfxCertFilePath" >> $env:GITHUB_ENV
        echo "::add-mask::$certPassword"
        echo "CERT_PASSWORD=$certPassword" >> $env:GITHUB_ENV
        echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
      shell: pwsh
      
    - name: Build MSIX package
      run: |
        # Build the MSIX package with the following settings:
        # - PublishTrimmed=false: Trimming is not compatible with MSIX framework-dependent packaging
        # - PublishReadyToRun=false: Disabled to avoid NETSDK1102 error for non-self-contained apps
        msbuild ${{ env.App_Project_Path }} `
          /p:Platform=${{ env.Platform }} `
          /p:Configuration=${{ env.Configuration }} `
          /p:UapAppxPackageBuildMode=SideloadOnly `
          /p:AppxBundle=Always `
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\" `
          /p:AppxPackageSigningEnabled=true `
          /p:PackageCertificateKeyFile="${{ env.PFX_CERT_PATH }}" `
          /p:PackageCertificatePassword="${{ env.CERT_PASSWORD }}" `
          /p:GenerateAppInstallerFile=true `
          /p:AppInstallerUri="https://github.com/${{ github.repository }}/releases/download/latest/" `
          /p:PublishTrimmed=false `
          /p:PublishReadyToRun=false `
          /restore
      shell: pwsh
      
    - name: Remove certificate
      if: always()
      run: |
        if (Test-Path env:CERT_THUMBPRINT) {
          Remove-Item -Path "Cert:\CurrentUser\My\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          Remove-Item -Path "Cert:\LocalMachine\Root\$env:CERT_THUMBPRINT" -ErrorAction SilentlyContinue
        }
      shell: pwsh
      
    - name: List generated files
      run: |
        Write-Host "Contents of AppPackages directory:"
        Get-ChildItem -Path "${{ github.workspace }}\AppPackages" -Recurse | Select-Object FullName
      shell: pwsh
      
    - name: Upload MSIX bundle
      uses: actions/upload-artifact@v4
      with:
        name: msix-package-${{ github.run_number }}
        path: |
          AppPackages/**/*.msixbundle
          AppPackages/**/*.msixupload
          AppPackages/**/*.appinstaller
          AppPackages/**/*.cer
        if-no-files-found: error
        retention-days: 90
