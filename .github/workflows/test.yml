name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: true
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'
        
    - name: Restore dependencies
      run: dotnet restore Tests/ArchitectureTests/ArchitectureTests.csproj
      
    - name: Build tests
      run: dotnet build Tests/ArchitectureTests/ArchitectureTests.csproj --configuration Release --no-restore
      
    - name: Run tests with coverage
      run: |
        dotnet test Tests/ArchitectureTests/ArchitectureTests.csproj `
          --configuration Release `
          --no-build `
          --verbosity normal `
          /p:CollectCoverage=true `
          /p:CoverletOutputFormat=cobertura `
          /p:CoverletOutput=./coverage/coverage.cobertura.xml
      
    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      if: always()
      continue-on-error: true
      with:
        filename: Tests/ArchitectureTests/coverage/coverage.cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: false
        indicators: true
        output: both
        thresholds: '60 80'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      continue-on-error: true
      with:
        recreate: true
        path: code-coverage-results.md



