name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        submodules: recursive
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'
        
    - name: Restore dependencies
      run: dotnet restore Tests/ArchitectureTests/ArchitectureTests.csproj
      
    - name: Build tests
      run: dotnet build Tests/ArchitectureTests/ArchitectureTests.csproj --configuration Release --no-restore
      
    - name: Run tests with coverage
      run: |
        dotnet test Tests/ArchitectureTests/ArchitectureTests.csproj `
          --configuration Release `
          --no-build `
          --verbosity normal `
          /p:CollectCoverage=true `
          /p:CoverletOutputFormat=cobertura `
          /p:CoverletOutput=./coverage/coverage.cobertura.xml
      
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: coverage-report
        path: Tests/ArchitectureTests/coverage/coverage.cobertura.xml
        retention-days: 1

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Download coverage artifact
      uses: actions/download-artifact@v5
      with:
        name: coverage-report
        path: coverage
      
    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      id: coverage
      with:
        filename: coverage/coverage.cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: false
        indicators: true
        output: both
        thresholds: '60 80'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      continue-on-error: true
      with:
        recreate: true
        path: code-coverage-results.md
    
    - name: Create Coverage Badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GIST_SECRET }}
        gistID: bookmarkly-coverage-badge
        filename: coverage.json
        label: Coverage
        message: ${{ steps.coverage.outputs.line-rate }}%
        color: ${{ steps.coverage.outputs.line-rate > 80 && 'green' || steps.coverage.outputs.line-rate > 60 && 'yellow' || 'red' }}
        namedLogo: .NET



