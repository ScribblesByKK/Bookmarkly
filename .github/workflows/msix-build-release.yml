name: MSIX Build and Release

on:
  # Run on push to main branch (merges)
  push:
    branches:
      - main

env:
  SOLUTION_FILE_PATH: Bookmarkly.slnx
  PROJECT_PATH: Bookmarkly.App/Bookmarkly.App.csproj
  CONFIGURATION: Release
  PLATFORM: x64

permissions:
  contents: write  # Required for creating releases

jobs:
  bump-version:
    name: Bump Version
    runs-on: self-hosted
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        submodules: recursive
      
    - name: Update version
      id: version
      run: |
        ./build/update-version.ps1
      shell: pwsh
      
    - name: Commit version changes
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add build/version.json Bookmarkly.App/Package.appxmanifest
        git diff --staged --quiet || git commit -m "chore: update version to ${{ steps.version.outputs.version }} [skip ci]"
        git push
      shell: pwsh

  build:
    name: Build Solution
    runs-on: self-hosted
    needs: bump-version
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        ref: main
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        fetch-depth: 1
        submodules: recursive
    
    - name: Locate MSBuild using vswhere
      id: msbuild
      run: |
        $vswherePath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (-not (Test-Path $vswherePath)) {
          Write-Error "vswhere.exe not found at $vswherePath"
          exit 1
        }
        
        # Find VS 2026 (version 18.x) installation path
        $vsPath = & $vswherePath -version "[18.0,19.0)" -products * -requires Microsoft.Component.MSBuild -property installationPath -latest
        if ([string]::IsNullOrEmpty($vsPath)) {
          Write-Error "Visual Studio 2026 Build Tools not found"
          exit 1
        }
        
        # Use the amd64 version of MSBuild
        $msbuildPath = Join-Path $vsPath "MSBuild\Current\Bin\amd64\MSBuild.exe"
        if (-not (Test-Path $msbuildPath)) {
          Write-Error "MSBuild not found at $msbuildPath"
          exit 1
        }
        
        Write-Host "Found MSBuild at: $msbuildPath"
        echo "MSBUILD_PATH=$msbuildPath" >> $env:GITHUB_OUTPUT
        echo "MSBUILD_PATH=$msbuildPath" >> $env:GITHUB_ENV
      shell: pwsh
      
    - name: Restore NuGet packages
      run: dotnet restore ${{ env.SOLUTION_FILE_PATH }}
      
    - name: Create temporary signing certificate
      run: |
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Bookmarkly-Temp-Cert" -KeyUsage DigitalSignature -FriendlyName "Bookmarkly Temp Signing Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $password = ConvertTo-SecureString -String "${{ secrets.CERT_PASSWORD || 'TempPassword123!' }}" -Force -AsPlainText
        Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath GitHubActionsWorkflow.pfx -Password $password
        echo "Certificate created successfully"
      shell: pwsh
      
    - name: Build MSIX package
      run: |
        & "$env:MSBUILD_PATH" ${{ env.PROJECT_PATH }} `
          /p:Configuration=${{ env.CONFIGURATION }} `
          /p:Platform=${{ env.PLATFORM }} `
          /p:PublishTrimmed=false `
          /p:UapAppxPackageBuildMode=SideloadOnly `
          /p:AppxBundle=Always `
          /p:RuntimeIdentifier=win-x64 `
          /p:AppxBundlePlatforms=${{ env.PLATFORM }} `
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\" `
          /p:AppxPackageSigningEnabled=true `
          /p:PackageCertificateKeyFile="${{ github.workspace }}\GitHubActionsWorkflow.pfx" `
          /p:PackageCertificatePassword="${{ secrets.CERT_PASSWORD || 'TempPassword123!' }}" `
          /t:_GenerateAppxPackage `
          /restore `
          /bl:msbuild.binlog
      shell: pwsh
      
    - name: Remove certificate file
      run: Remove-Item -Path GitHubActionsWorkflow.pfx -Force
      shell: pwsh
      if: always()
      
    - name: Upload build binary log
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: msbuild-binlog
        path: msbuild.binlog
        retention-days: 7
      
    - name: Upload build output
      uses: actions/upload-artifact@v5
      with:
        name: build-output
        path: AppPackages/
        retention-days: 1

  package:
    name: Create Package
    runs-on: self-hosted
    needs: [bump-version, build]
    
    steps:
    - name: Download build output
      uses: actions/download-artifact@v5
      with:
        name: build-output
        path: AppPackages/
      
    - name: Package into zip
      run: |
        $zipName = "Bookmarkly_${{ needs.bump-version.outputs.version }}.zip"
        if (-not (Test-Path -Path "AppPackages")) {
          Write-Error "AppPackages folder not found. Failing so you can inspect logs."
          exit 1
        }
        Compress-Archive -Path "AppPackages\*" -DestinationPath $zipName -Force
        Write-Host "Created zip: $zipName"
      shell: pwsh
      
    - name: Upload package artifact
      uses: actions/upload-artifact@v5
      with:
        name: Bookmarkly_${{ needs.bump-version.outputs.version }}
        path: Bookmarkly_${{ needs.bump-version.outputs.version }}.zip
        if-no-files-found: error

  release:
    name: Create Release
    runs-on: self-hosted
    needs: [bump-version, package]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download package artifact
      uses: actions/download-artifact@v5
      with:
        name: Bookmarkly_${{ needs.bump-version.outputs.version }}
        path: .
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.bump-version.outputs.version }}
        name: Release v${{ needs.bump-version.outputs.version }}
        files: Bookmarkly_${{ needs.bump-version.outputs.version }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
