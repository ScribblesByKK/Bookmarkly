<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Bookmarkly - Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Segoe UI', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['Consolas', 'Monaco', 'monospace'],
                    },
                },
            },
        }
    </script>
    <style>
        /* Custom styles for release notes details/summary */
        .release-item summary {
            cursor: pointer;
            list-style: none;
        }
        .release-item summary::-webkit-details-marker {
            display: none;
        }
        .release-item summary::before {
            content: '▶';
            display: inline-block;
            margin-right: 0.5rem;
            transition: transform 0.2s ease;
        }
        .release-item[open] summary::before {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
    <div class="max-w-4xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
        <!-- Header -->
        <header class="text-center mb-12">
            <img src="./assets/app-icon.png" alt="Bookmarkly Icon" class="w-24 h-24 mx-auto mb-6 rounded-2xl shadow-lg">
            <h1 class="text-4xl sm:text-5xl font-bold text-gray-900 dark:text-white mb-2">Bookmarkly</h1>
            <p class="text-lg text-gray-600 dark:text-gray-400 mb-4">A modern app for your bookmarks</p>
            <div class="inline-flex items-center gap-3 flex-wrap justify-center">
                <span class="inline-block bg-indigo-600 text-white px-4 py-1.5 rounded-full text-sm font-semibold">{{VERSION}}</span>
                <span class="text-sm text-gray-500 dark:text-gray-400 font-mono">SHA: {{ZIP_SHA}}</span>
            </div>
        </header>

        <!-- Download Section -->
        <section class="mb-12">
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="{{APPINSTALLER_URL}}" 
                   class="inline-flex items-center gap-3 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download App Installer
                </a>
                <a href="{{ZIP_URL}}" 
                   class="inline-flex items-center gap-3 px-6 py-3 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 font-semibold rounded-lg shadow-md border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                    </svg>
                    Direct ZIP
                </a>
            </div>
            <p class="text-center text-gray-600 dark:text-gray-400 mt-4 text-sm">
                Use App Installer for automatic updates, or download the ZIP for manual installation.
            </p>
        </section>

        <!-- Release Notes Section -->
        <section class="bg-white dark:bg-gray-800 rounded-xl shadow-md border border-gray-200 dark:border-gray-700 p-6 sm:p-8">
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Release Notes
            </h2>
            <div class="space-y-4">
                {{RELEASE_NOTES}}
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-12 pt-8 border-t border-gray-200 dark:border-gray-700 text-center text-gray-600 dark:text-gray-400">
            <p class="mb-2">
                &copy; 2026 Kumara Krishnan &middot;
                <a href="https://github.com/Kumara-Krishnan/Bookmarkly" target="_blank" rel="noopener noreferrer" class="text-indigo-600 dark:text-indigo-400 hover:underline focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded">View on GitHub</a>
            </p>
        </footer>
    </div>
</body>
</html>
