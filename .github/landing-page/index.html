<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarkly - Download</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --accent-color: #a855f7;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 60%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            animation: float 20s ease-in-out infinite;
        }

        .background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, transparent 40%, rgba(99, 102, 241, 0.05) 50%, transparent 60%),
                linear-gradient(225deg, transparent 40%, rgba(139, 92, 246, 0.05) 50%, transparent 60%);
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 8px 24px rgba(99, 102, 241, 0.3));
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .commit-sha {
            color: var(--text-secondary);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
        }

        .download-section {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 24px;
            height: 24px;
        }

        .release-notes {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-top: 40px;
        }

        .release-notes h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .release-notes h2 svg {
            width: 24px;
            height: 24px;
            color: var(--primary-color);
        }

        .release-item {
            border-left: 3px solid var(--primary-color);
            padding-left: 20px;
            margin-bottom: 25px;
        }

        .release-item:last-child {
            margin-bottom: 0;
        }

        .release-item h3 {
            color: var(--primary-color);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .release-item .date {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .release-item ul {
            list-style: none;
            padding: 0;
        }

        .release-item li {
            color: var(--text-secondary);
            padding: 4px 0;
            padding-left: 20px;
            position: relative;
        }

        .release-item li::before {
            content: '•';
            color: var(--accent-color);
            position: absolute;
            left: 0;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            .download-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <header>
            <img src="./assets/app-icon.png" alt="Bookmarkly Icon" class="app-icon">
            <h1>Bookmarkly</h1>
            <div class="version-badge">{{VERSION}}</div>
            <p class="commit-sha">Commit: {{COMMIT_SHA}}</p>
        </header>

        <section class="download-section">
            <a href="{{ZIP_URL}}" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download Package (ZIP)
            </a>
            <a href="https://github.com/Kumara-Krishnan/Bookmarkly/releases" class="btn btn-secondary" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                </svg>
                View All Releases
            </a>
        </section>

        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">
            The package contains an MSIX installer bundle for Windows.
        </p>

        <section class="release-notes">
            <h2>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Release Notes
            </h2>
            {{RELEASE_NOTES}}
        </section>

        <footer>
            <p>
                <a href="https://github.com/Kumara-Krishnan/Bookmarkly" target="_blank">View on GitHub</a>
                &nbsp;•&nbsp;
                <a href="https://github.com/Kumara-Krishnan/Bookmarkly/releases" target="_blank">All Releases</a>
            </p>
            <p style="margin-top: 10px;">
                A bookmark management application for Windows.
            </p>
        </footer>
    </div>
</body>
</html>
